<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brecht Dashboard Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0D1F35;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 20px; color: #C8922A; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  .section { margin-bottom: 28px; }
  .section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #C8922A; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(200,146,42,0.3); }
  label { display: block; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
  input, textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    padding: 10px 12px;
    margin-bottom: 12px;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: #C8922A; }
  select option { background: #0D1F35; }
  textarea { min-height: 60px; resize: vertical; }
  .btn {
    background: #C8922A;
    color: #0D1F35;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 20px;
    width: 100%;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn:active { opacity: 0.85; }
  .btn-danger {
    background: rgba(255,255,255,0.08);
    color: #FF8080;
    border: 1px solid rgba(255,100,100,0.3);
    font-weight: 400;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 6px;
  }
  .item-store {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .costco { background: rgba(255,0,0,0.2); color: #FF8080; }
  .kroger { background: rgba(39,174,96,0.2); color: #7FD4A8; }
  .sams   { background: rgba(74,158,205,0.2); color: #7FC8E8; }
  .item-name { flex: 1; font-size: 13px; }
  .item-del { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; padding: 0 4px; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #27AE60; color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .add-row { display: flex; gap: 8px; }
  .add-row input { margin-bottom: 0; flex: 1; }
  .add-row select { margin-bottom: 0; width: 110px; flex-shrink: 0; }
  .add-btn {
    background: #C8922A; color: #0D1F35; border: none;
    border-radius: 8px; font-weight: 700; font-size: 20px;
    width: 44px; flex-shrink: 0; cursor: pointer;
  }
</style>
</head>
<body>
<h1>Brecht Dashboard</h1>
<div class="subtitle">Admin panel — changes appear on the kitchen TV within 30 seconds</div>

<div class="section">
  <h2>Tonight's Dinner</h2>
  <label>Meal name</label>
  <input type="text" id="meal-input" placeholder="e.g. Smashburgers + sweet potato wedges">
  <label>Notes (optional)</label>
  <input type="text" id="meal-note-input" placeholder="e.g. Kevin: lettuce wrap, no bun">
  <button class="btn" onclick="saveMeal()">Save Dinner</button>
</div>

<div class="section">
  <h2>Shopping List</h2>
  <div class="add-row">
    <input type="text" id="shop-input" placeholder="Item to pick up..." onkeydown="if(event.key==='Enter')addShopItem()">
    <select id="shop-store">
      <option>Costco</option>
      <option>Kroger</option>
      <option>Sam's</option>
    </select>
    <button class="add-btn" onclick="addShopItem()">+</button>
  </div>
  <div style="margin-top:10px" id="shop-list"></div>
  <button class="btn btn-danger" style="margin-top:8px" onclick="clearShopping()">Clear all items</button>
</div>

<div class="toast" id="toast">Saved!</div>

<script>
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function saveMeal() {
  const meal = document.getElementById("meal-input").value.trim();
  const note = document.getElementById("meal-note-input").value.trim();
  if (!meal) return;
  localStorage.setItem("brecht_meal", meal);
  localStorage.setItem("brecht_meal_note", note);
  localStorage.setItem("brecht_last_updated", new Date().toISOString());
  showToast("Dinner saved!");
}

function getItems() {
  const raw = localStorage.getItem("brecht_shopping");
  return raw ? JSON.parse(raw) : [];
}

function saveItems(items) {
  localStorage.setItem("brecht_shopping", JSON.stringify(items));
  localStorage.setItem("brecht_last_updated", new Date().toISOString());
  renderItems();
}

function addShopItem() {
  const name = document.getElementById("shop-input").value.trim();
  const store = document.getElementById("shop-store").value;
  if (!name) return;
  const items = getItems();
  items.push({ name, store });
  saveItems(items);
  document.getElementById("shop-input").value = "";
  showToast("Item added!");
}

function removeItem(i) {
  const items = getItems();
  items.splice(i, 1);
  saveItems(items);
}

function clearShopping() {
  if (confirm("Clear all shopping items?")) {
    localStorage.removeItem("brecht_shopping");
    renderItems();
    showToast("List cleared");
  }
}

function renderItems() {
  const items = getItems();
  const list = document.getElementById("shop-list");
  if (!items.length) { list.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:13px">No items yet</div>'; return; }
  list.innerHTML = items.map((item, i) => {
    const cls = item.store === "Costco" ? "costco" : item.store === "Kroger" ? "kroger" : "sams";
    return `<div class="item-row">
      <span class="item-store ${cls}">${item.store}</span>
      <span class="item-name">${item.name}</span>
      <button class="item-del" onclick="removeItem(${i})">×</button>
    </div>`;
  }).join("");
}

// Pre-fill current values
const curMeal = localStorage.getItem("brecht_meal") || "";
const curNote = localStorage.getItem("brecht_meal_note") || "";
document.getElementById("meal-input").value = curMeal;
document.getElementById("meal-note-input").value = curNote;
renderItems();
</script>
</body>
</html>
